<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>nozaqi 3DCG showcase</title>
    <style>
      *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        background: #111;
        color: #fff;
        -webkit-font-smoothing: antialiased;
      }

      .container {
        max-width: 1200px;
        margin: 0 auto;
        padding: 64px 32px;
      }

      h1 {
        font-size: 32px;
        font-weight: 700;
        margin-bottom: 48px;
        letter-spacing: 2px;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(480px, 1fr));
        gap: 32px;
      }

      .card {
        border: 1px solid #222;
        border-radius: 12px;
        overflow: hidden;
        text-decoration: none;
        color: inherit;
        transition: box-shadow 0.2s ease;
      }

      .card:hover {
        box-shadow: 0 4px 24px rgba(255, 255, 255, 0.06);
      }

      .card-thumbnail {
        width: 100%;
        aspect-ratio: 16 / 10;
        object-fit: cover;
        display: block;
        background: #1a1a1a;
      }

      .card-body {
        padding: 24px;
        display: flex;
        gap: 24px;
        align-items: flex-start;
      }

      .card-title {
        font-size: 20px;
        font-weight: 700;
        line-height: 1.3;
        letter-spacing: -0.01em;
        flex: 1;
      }

      .card-description {
        font-size: 14px;
        line-height: 1.5;
        color: #B8B9BA;
        flex: 0 0 180px;
      }

      .card-date {
        padding: 0 24px 24px;
        font-size: 14px;
        color: #808080;
      }

      @media (max-width: 560px) {
        .container { padding: 32px 16px; }
        .grid { grid-template-columns: 1fr; }
        h1 { font-size: 24px; margin-bottom: 32px; }
        .card-body { flex-direction: column; gap: 12px; }
        .card-description { flex: none; }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>nozaqi 3DCG showcase</h1>
      <div class="grid" id="grid"></div>
    </div>
    <script type="module" src="/src/index.ts"></script>
  </body>
</html>
